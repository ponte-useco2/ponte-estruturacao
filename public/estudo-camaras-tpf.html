<style>
html{scroll-behavior:smooth}
body{margin:0;background:#FBFCFE;-webkit-font-smoothing:antialiased}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
.navlink:hover{color:#D9B36B !important}
.navcta:hover{background:#D9B36B !important}
.rowh:hover{background:#F5F8FC}
.rowh2:hover{background:#FBFCFE}
#gate{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#182C48 0%,#1F3A5F 55%,#2C4E7A 100%);font-family:'Libre Franklin',sans-serif}
#gate .halo{position:absolute;inset:0;background:radial-gradient(1100px 500px at 85% -10%,rgba(192,145,63,.16),transparent 60%)}
#gate .card{position:relative;text-align:center;padding:40px 34px;max-width:420px;width:calc(100% - 48px);animation:fadeUp .7s ease both}
#gate .mono{display:grid;place-items:center;width:54px;height:54px;border:1px solid #C0913F;color:#C0913F;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:30px;margin:0 auto}
#gate h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:32px;line-height:1.2;color:#FFFFFF;margin:26px 0 0}
#gate p.sub{font-size:12px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:#D9B36B;margin:18px 0 0}
#gate p.hint{font-size:13.5px;font-weight:300;line-height:1.7;color:#C9D6E6;margin:14px 0 0}
#gate form{margin:30px 0 0;display:flex;gap:0}
#gate input{flex:1;background:rgba(237,242,249,.06);border:1px solid rgba(217,228,241,.35);border-right:none;color:#EDF2F9;font-family:'Libre Franklin',sans-serif;font-size:14px;letter-spacing:.14em;padding:13px 16px;outline:none;border-radius:0}
#gate input:focus{border-color:#C0913F}
#gate input::placeholder{color:#9FB4CE;letter-spacing:.1em}
#gate button{background:#C0913F;color:#1F3A5F;border:none;font-family:'Libre Franklin',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:0 22px;cursor:pointer}
#gate button:hover{background:#D9B36B}
#gate .err{font-size:12px;color:#E8A9A9;letter-spacing:.06em;margin:14px 0 0;min-height:16px}
#gate .foot{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#9FB4CE;margin:34px 0 0}
@media (max-width:1000px){
  .grid5{grid-template-columns:1fr 1fr !important}
  .grid5>div{border-right:none !important;border-bottom:1px solid rgba(217,228,241,.12)}
  .grid4{grid-template-columns:1fr 1fr !important}
  .grid3{grid-template-columns:1fr !important}
  .grid2{grid-template-columns:1fr !important}
  .grid-side{grid-template-columns:1fr !important;gap:30px !important}
  .navlinks a.navlink{display:none}
  .refcols{columns:1 !important}
  .thead{display:none !important}
  .trow{grid-template-columns:1fr !important;gap:8px !important}
  .trow5{grid-template-columns:1fr !important;gap:8px !important}
  .grid4s{grid-template-columns:1fr 1fr !important}
}
</style>
</head>

  };
  var b2u = function(b){ var s = atob(b), u = new Uint8Array(s.length); for (var i=0;i<s.length;i++) u[i]=s.charCodeAt(i); return u; };

  function unlock(pw){
    var enc = new TextEncoder();
    return crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey'])
      .then(function(bk){
        return crypto.subtle.deriveKey(
          { name:'PBKDF2', salt:b2u(PAYLOAD.salt), iterations:310000, hash:'SHA-256' },
          bk, { name:'AES-GCM', length:256 }, false, ['decrypt']);
      })
      .then(function(key){
        return crypto.subtle.decrypt({ name:'AES-GCM', iv:b2u(PAYLOAD.iv) }, key, b2u(PAYLOAD.data));
      })
      .then(function(plain){ return new TextDecoder().decode(plain); });
  }

  function reveal(html, pw){
    try { sessionStorage.setItem('ecmtpf_k', pw); } catch(e){}
    var app = document.getElementById('app');
    app.innerHTML = html;
    app.style.display = '';
    var gate = document.getElementById('gate');
    gate.parentNode.removeChild(gate);
    document.title = 'Câmaras de Mediação × TPF — Estudo de Mercado · Ponte';
    var bar = document.getElementById('progressbar');
    var onScroll = function(){
      var doc = document.documentElement;
      var max = doc.scrollHeight - window.innerHeight;
      var p = max > 0 ? (window.scrollY / max) * 100 : 0;
      if (bar) bar.style.width = Math.min(100, Math.max(0, p)) + '%';
    };
    window.addEventListener('scroll', onScroll, { passive:true });
    onScroll();
  }

  document.getElementById('gateform').addEventListener('submit', function(ev){
    ev.preventDefault();
    var pw = document.getElementById('pw').value.trim().toLowerCase();
    var err = document.getElementById('err');
    var card = document.querySelector('#gate .card');
    err.textContent = '';
    if (!pw) return;
    unlock(pw).then(function(html){ reveal(html, pw); })
      .catch(function(){
        err.textContent = 'Senha incorreta. Verifique e tente novamente.';
        card.style.animation = 'none'; void card.offsetWidth;
        card.style.animation = 'shake .45s ease';
        document.getElementById('pw').select();
      });
  });

  try {
    var saved = sessionStorage.getItem('ecmtpf_k');
    if (saved) unlock(saved).then(function(html){ reveal(html, saved); }).catch(function(){ try{sessionStorage.removeItem('ecmtpf_k');}catch(e){} });
  } catch(e){}
})();
</script>
